  <text x="116" y="508" font-size="17" fill="#4A5872">ards plus high scores, while the full set is mixed. Work</text>
  <rect x="622" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
