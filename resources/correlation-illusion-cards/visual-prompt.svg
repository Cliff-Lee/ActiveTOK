<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Correlation Illusion Cards visual prompt</title>
  <desc id="desc">Original classroom visual prompt for the Correlation Illusion Cards TOK activity.</desc>
