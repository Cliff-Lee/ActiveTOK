  <text x="116" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 1: Cards pair 'used flashcards /</text>
  <text x="116" y="328" font-size="17" fill="#4A5872"> did not use flashcards' with 'high quiz score / lower q</text>
  <rect x="622" y="230" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="622" y="230" width="12" height="128" rx="6" fill="#D89B38"/>
  <text x="656" y="266" font-size="20" font-weight="700" fill="#172033">Correlation Illusion Cards Stimulus B</text>
  <text x="656" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 2: A few vivid cards show flashc</text>
  <text x="656" y="328" font-size="17" fill="#4A5872">ards plus high scores, while the full set is mixed. Work</text>
  <rect x="82" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
