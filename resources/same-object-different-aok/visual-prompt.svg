<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Same Object, Different AOK visual prompt</title>
  <desc id="desc">Original classroom visual prompt for the Same Object, Different AOK TOK activity.</desc>
  <rect width="1200" height="675" fill="#F7F3EA"/>
  <rect x="0" y="0" width="22" height="675" fill="#2F865F"/>
  <rect x="22" y="0" width="12" height="675" fill="#D89B38"/>
  <text x="82" y="92" font-size="24" font-weight="700" fill="#1F6448">Cross-AOK • 30-40 min</text>
  <text x="82" y="150" font-size="46" font-weight="800" fill="#172033">Same Object, Different AOK</text>
  <text x="82" y="190" font-size="24" fill="#4A5872">One object can carry many kinds of knowledge.</text>

  <rect x="82" y="230" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="82" y="230" width="12" height="128" rx="6" fill="#2F865F"/>
  <text x="116" y="266" font-size="20" font-weight="700" fill="#172033">Same Object, Different AOK Stimulus A</text>
  <text x="116" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 1: A shell, coin, photograph, or</text>
  <text x="116" y="328" font-size="17" fill="#4A5872"> medicine bottle examined by multiple AOKs. Name the AOK</text>
  <rect x="622" y="230" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="622" y="230" width="12" height="128" rx="6" fill="#D89B38"/>
  <text x="656" y="266" font-size="20" font-weight="700" fill="#172033">Same Object, Different AOK Stimulus B</text>
  <text x="656" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 2: A matrix with rows for AOK an</text>
  <text x="656" y="328" font-size="17" fill="#4A5872">d columns for questions, methods, and evidence. Name the</text>
  <rect x="82" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="82" y="410" width="12" height="128" rx="6" fill="#385E7F"/>
  <text x="116" y="446" font-size="20" font-weight="700" fill="#172033">Same Object, Different AOK Reveal / Tw</text>
  <text x="116" y="482" font-size="17" fill="#4A5872">Student-facing stimulus 3: A debrief on whether the obje</text>
  <text x="116" y="508" font-size="17" fill="#4A5872">ct changes or the knower's purpose changes. Name the AOK</text>
  <rect x="622" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="622" y="410" width="12" height="128" rx="6" fill="#8A5D14"/>
  <text x="656" y="446" font-size="20" font-weight="700" fill="#172033">Question 1</text>
  <text x="656" y="482" font-size="17" fill="#4A5872">Write one claim in a complete sentence.</text>
  <text x="656" y="508" font-size="17" fill="#4A5872"></text>
  <text x="82" y="620" font-size="20" font-weight="700" fill="#172033">Use these cards to launch, sort, rank, or debrief the activity.</text>
</svg>
