  <text x="116" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 1: Question: 'How useful is home</text>
  <text x="116" y="328" font-size="17" fill="#4A5872">work for learning?' Styles: warm, rushed, leading, skept</text>
  <rect x="622" y="230" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="622" y="230" width="12" height="128" rx="6" fill="#D89B38"/>
  <text x="656" y="266" font-size="20" font-weight="700" fill="#172033">Interviewer Effect Simulation Stimulus</text>
  <text x="656" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 2: Question: 'What makes a class</text>
  <text x="656" y="328" font-size="17" fill="#4A5872">room discussion good?' Styles: encouraging, distracted, </text>
  <rect x="82" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="82" y="410" width="12" height="128" rx="6" fill="#385E7F"/>
  <text x="116" y="446" font-size="20" font-weight="700" fill="#172033">Interviewer Effect Simulation Reveal /</text>
  <text x="116" y="482" font-size="17" fill="#4A5872">Student-facing stimulus 3: Question: 'What makes a class</text>
  <text x="116" y="508" font-size="17" fill="#4A5872">room discussion good?' Styles: encouraging, distracted, </text>
  <rect x="622" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="622" y="410" width="12" height="128" rx="6" fill="#8A5D14"/>
  <text x="656" y="446" font-size="20" font-weight="700" fill="#172033">Question 1</text>
  <text x="656" y="482" font-size="17" fill="#4A5872">Write one claim in a complete sentence.</text>
  <text x="656" y="508" font-size="17" fill="#4A5872"></text>
  <text x="82" y="620" font-size="20" font-weight="700" fill="#172033">Use these cards to launch, sort, rank, or debrief the activity.</text>
