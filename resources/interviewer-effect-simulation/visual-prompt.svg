  <text x="82" y="92" font-size="24" font-weight="700" fill="#1F6448">Human Sciences • 30-40 min</text>
  <text x="82" y="150" font-size="46" font-weight="800" fill="#172033">Interviewer Effect Simulation</text>
  <text x="82" y="190" font-size="24" fill="#4A5872">In human sciences, the person asking can become part of the evidence produced.</text>

