<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Infinity Hotel Check-In visual prompt</title>
  <desc id="desc">Original classroom visual prompt for the Infinity Hotel Check-In TOK activity.</desc>
  <rect width="1200" height="675" fill="#F7F3EA"/>
  <rect x="0" y="0" width="22" height="675" fill="#2F865F"/>
  <rect x="22" y="0" width="12" height="675" fill="#D89B38"/>
  <text x="82" y="92" font-size="24" font-weight="700" fill="#1F6448">Mathematics • 25-35 min</text>
  <text x="82" y="150" font-size="46" font-weight="800" fill="#172033">Infinity Hotel Check-In</text>
  <text x="82" y="190" font-size="24" fill="#4A5872">Mathematical concepts can be coherent even when they violate ordinary experience.</text>

  <rect x="82" y="230" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="82" y="230" width="12" height="128" rx="6" fill="#2F865F"/>
  <text x="116" y="266" font-size="20" font-weight="700" fill="#172033">Finite hotel</text>
  <text x="116" y="302" font-size="17" fill="#4A5872">A 10-room hotel is full. One guest arrives.</text>
  <text x="116" y="328" font-size="17" fill="#4A5872"></text>
  <rect x="622" y="230" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="622" y="230" width="12" height="128" rx="6" fill="#D89B38"/>
  <text x="656" y="266" font-size="20" font-weight="700" fill="#172033">Infinite hotel</text>
  <text x="656" y="302" font-size="17" fill="#4A5872">Every positive integer room is full. One guest arrives.</text>
  <text x="656" y="328" font-size="17" fill="#4A5872"></text>
  <rect x="82" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="82" y="410" width="12" height="128" rx="6" fill="#385E7F"/>
  <text x="116" y="446" font-size="20" font-weight="700" fill="#172033">Claim</text>
  <text x="116" y="482" font-size="17" fill="#4A5872">∞ + 1 = ∞</text>
  <text x="116" y="508" font-size="17" fill="#4A5872"></text>
  <rect x="622" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="622" y="410" width="12" height="128" rx="6" fill="#8A5D14"/>
  <text x="656" y="446" font-size="20" font-weight="700" fill="#172033">Rule check</text>
  <text x="656" y="482" font-size="17" fill="#4A5872">Guest in room 1 moves to 2, 2 moves to 3, 3 moves to 4, </text>
  <text x="656" y="508" font-size="17" fill="#4A5872">and so on.</text>
  <text x="82" y="620" font-size="20" font-weight="700" fill="#172033">Use these cards to launch, sort, rank, or debrief the activity.</text>
</svg>
