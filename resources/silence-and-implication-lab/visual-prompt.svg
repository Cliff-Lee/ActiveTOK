  <rect x="622" y="230" width="12" height="128" rx="6" fill="#D89B38"/>
  <text x="656" y="266" font-size="20" font-weight="700" fill="#172033">Silence and Implication Lab Stimulus B</text>
  <text x="656" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 2: Dialogue: 'Are you coming to </text>
  <text x="656" y="328" font-size="17" fill="#4A5872">the meeting?' 'I have a lot of homework tonight.'. Annot</text>
  <rect x="82" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="82" y="410" width="12" height="128" rx="6" fill="#385E7F"/>
  <text x="116" y="446" font-size="20" font-weight="700" fill="#172033">Silence and Implication Lab Reveal / T</text>
  <text x="116" y="482" font-size="17" fill="#4A5872">Student-facing stimulus 3: Dialogue: 'Are you coming to </text>
  <text x="116" y="508" font-size="17" fill="#4A5872">the meeting?' 'I have a lot of homework tonight.'. Annot</text>
