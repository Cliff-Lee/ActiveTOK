  <text x="82" y="92" font-size="24" font-weight="700" fill="#1F6448">Knowledge and Language • 20-30 min</text>
  <text x="82" y="150" font-size="46" font-weight="800" fill="#172033">Silence and Implication Lab</text>
  <text x="82" y="190" font-size="24" fill="#4A5872">Meaning often depends on implication; silence can communicate without explicitly claim</text>

