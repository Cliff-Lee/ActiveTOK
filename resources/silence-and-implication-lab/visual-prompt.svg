  <text x="116" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 1: Dialogue: 'Did you like my pr</text>
  <text x="116" y="328" font-size="17" fill="#4A5872">esentation?' 'Well, your slides were very colorful.'. An</text>
