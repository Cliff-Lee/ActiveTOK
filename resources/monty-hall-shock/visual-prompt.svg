  <rect x="82" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="82" y="410" width="12" height="128" rx="6" fill="#385E7F"/>
  <text x="116" y="446" font-size="20" font-weight="700" fill="#172033">Round 3</text>
  <text x="116" y="482" font-size="17" fill="#4A5872">Car behind Door C. First choice: Door A. Host opens Door</text>
  <text x="116" y="508" font-size="17" fill="#4A5872"> B.</text>
