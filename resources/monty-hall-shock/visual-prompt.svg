  <text x="656" y="446" font-size="20" font-weight="700" fill="#172033">Round 4</text>
  <text x="656" y="482" font-size="17" fill="#4A5872">Car behind Door A. First choice: Door C. Host opens Door</text>
  <text x="656" y="508" font-size="17" fill="#4A5872"> B.</text>
  <text x="82" y="620" font-size="20" font-weight="700" fill="#172033">Use these cards to launch, sort, rank, or debrief the activity.</text>
