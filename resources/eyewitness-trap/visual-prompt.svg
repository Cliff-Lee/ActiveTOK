  <text x="116" y="266" font-size="20" font-weight="700" fill="#172033">Eyewitness Trap Stimulus A</text>
  <text x="116" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 1: A busy classroom image follow</text>
  <text x="116" y="328" font-size="17" fill="#4A5872">ed by questions about colours, positions, and text. Befo</text>
  <rect x="622" y="230" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="622" y="230" width="12" height="128" rx="6" fill="#D89B38"/>
  <text x="656" y="266" font-size="20" font-weight="700" fill="#172033">Eyewitness Trap Stimulus B</text>
  <text x="656" y="302" font-size="17" fill="#4A5872">Student-facing stimulus 2: A short silent hallway scene </text>
  <text x="656" y="328" font-size="17" fill="#4A5872">with one misleading follow-up question. Before discussin</text>
  <rect x="82" y="410" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
  <rect x="82" y="410" width="12" height="128" rx="6" fill="#385E7F"/>
  <text x="116" y="446" font-size="20" font-weight="700" fill="#172033">Eyewitness Trap Reveal / Twist</text>
  <text x="116" y="482" font-size="17" fill="#4A5872">Student-facing stimulus 3: A confidence-versus-accuracy </text>
  <text x="116" y="508" font-size="17" fill="#4A5872">table for memory claims. Before discussing, write what y</text>
