  <text x="82" y="92" font-size="24" font-weight="700" fill="#1F6448">Knowledge and the Knower • 15-20 min</text>
  <text x="82" y="150" font-size="46" font-weight="800" fill="#172033">Eyewitness Trap</text>
  <text x="82" y="190" font-size="24" fill="#4A5872">Memory is reconstructive, not photographic.</text>

  <rect x="82" y="230" width="470" height="128" rx="18" fill="#FFFDF7" stroke="#DED8CB" stroke-width="2"/>
